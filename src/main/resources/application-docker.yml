spring:
  config:
    import: optional:configserver:http://finlearn-config-server:8888
  datasource:
    url: jdbc:postgresql://finlearn-postgres:5432/achievementdb
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  data:
    redis:
      host: finlearn-redis
      port: 6379

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://finlearn-eureka:8761/eureka/

loki:
  url: ${LOKI_URL:http://host.docker.internal:3100/loki/api/v1/push}
